        name: 1.1 GET All Categories
        meta:
          id: req_012142da70ed48879a8d8056f6b88020
          created: 1754629727500
          modified: 1754629727500
          isPrivate: false
          description: Should return all categories (no auth required)
          sortKey: -1000
        method: GET
        scripts:
          preRequest: ""
          afterResponse: >-
            const categories = insomnia.response.json();


            insomnia.test("Should return 200 OK", function() {
                insomnia.expect(insomnia.response.code).to.equal(200);
            });


            insomnia.test("Should return an array", function() {
                insomnia.expect(categories).to.be.an('array');
            });


            insomnia.test("Should have 3 default categories", function() {
                insomnia.expect(categories.length).to.equal(3);
            });


            insomnia.test("Each category should have required fields",
            function() {
                categories.forEach(function(cat) {
                    insomnia.expect(cat).to.have.property('categoryId');
                    insomnia.expect(cat).to.have.property('name');
                    insomnia.expect(cat).to.have.property('description');
                });
            });
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
