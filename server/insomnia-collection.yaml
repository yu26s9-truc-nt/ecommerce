          - name: Content-Type
            value: application/json
        authentication:
          type: bearer
          token: "{{adminToken}}"
        scripts:
          preRequest: ""
          afterResponse: >-
            const category = insomnia.response.json();

            const myFolder = insomnia.parentFolders.get("1 - Phase 1: Categories
            (Required)");


            insomnia.test("Should return 201 Created", function() {
                insomnia.expect(insomnia.response.code).to.equal(201);
            });


            insomnia.test("Should return created category with ID", function() {
                insomnia.expect(category).to.have.property('categoryId');
                insomnia.expect(category.categoryId).to.be.a('number');
                insomnia.expect(category.categoryId).to.be.above(0);
            });


            insomnia.test("Should return category with correct name", function()
            {
                insomnia.expect(category.name).to.equal("Test Category");
            });


            insomnia.test("Should return category with correct description",
            function() {
                insomnia.expect(category.description).to.equal("A test category created by admin");
            });


            // Save the new category ID for later tests

            if (myFolder && category.categoryId) {
                myFolder.environment.set("newCategoryId", category.categoryId);
                console.log("✓ New category ID saved:", category.categoryId);
            }

            insomnia.environment.set("newCategoryId", category.categoryId);
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
