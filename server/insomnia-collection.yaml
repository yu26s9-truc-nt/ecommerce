          preRequest: ""
          afterResponse: >-
            const product = insomnia.response.json();


            insomnia.test("Should return 200 OK", function() {
                insomnia.expect(insomnia.response.code).to.equal(200);
            });


            insomnia.test("Product ID should still be 1", function() {
                insomnia.expect(product.productId).to.equal(1);
