## datasource connection properties
spring.datasource.url=jdbc:mysql://localhost:3306/${DB_NAME:clothingstore}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

## jpa / hibernate
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

## flyway
spring.flyway.enabled=true

## jackson - allow request bodies to omit primitive id fields (e.g. POST without categoryId/productId);
## Boot 4's Jackson is strict by default and would 400 on a null/absent primitive. Defaults them to 0 instead.
spring.jackson.deserialization.fail-on-null-for-primitives=false

jwt.
jwt.token-timeout-seconds=108000

#server.port=8080

## swagger / springdoc
springdoc.swagger-ui.url=/openapi.yaml
springdoc.swagger-ui.path=/swagger-ui.html

## startup output
spring.main.log-startup-info=true
logging.level.root=debug
logging.level.org.springframework=INFO
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.zaxxer.hikari=WARN
logging.level.org.yearup=INFO

#.env
spring.config.import=optional:file:.env.properties


logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.boot.autoconfigure.flyway=DEBUG
debug=true